name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag (latest / next / beta)'
        required: false
        default: 'latest'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (server + web + bundle)
        run: npm run build

      - name: Verify bundle artifacts
        run: |
          test -f bin/prompt-armor.js
          test -f dist/server/index.js
          test -f dist/public/index.html
          ls -lah dist/server dist/public | head -20

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || 'latest' }}"
          echo "Publishing with --tag $TAG"
          npm publish --access public --tag "$TAG"
